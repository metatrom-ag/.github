name: Refresh Dashboard

# Triggers the full dashboard refresh pipeline in order:
#   1. Sync Global Project  — adds missing issues to projects, sets Inbox
#   2. Sync Iterations      — copies Iteration/Quarter from Global to repo projects
#   3. Update Dashboard     — fetches stats and commits updated README
#
# Use this when you want an immediate full refresh outside the daily schedule.
# The daily schedule still runs all workflows independently at 05:00 / 05:30 / 06:00 UTC.

on:
  workflow_dispatch:

jobs:
  sync:
    name: Sync Global Project
    uses: metatrom-ag/.github/.github/workflows/sync-global-project.yml@main
    secrets: inherit

  iterations:
    name: Sync Iterations & Quarters
    needs: sync
    uses: metatrom-ag/.github/.github/workflows/sync-iterations.yml@main
    secrets: inherit

  dashboard:
    name: Update Dashboard
    needs: iterations
    uses: metatrom-ag/.github/.github/workflows/update-private-dashboard.yml@main
    secrets: inherit
