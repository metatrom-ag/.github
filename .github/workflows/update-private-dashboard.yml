name: Update Dashboard

# Runs from the public .github repo (free minutes) and checks out
# .github-private to update the org profile dashboard there.

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:        # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          repository: metatrom-ag/.github-private
          token: ${{ secrets.PROJECT_SYNC_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: '23'

      - name: Fetch project stats and update README
        env:
          GH_TOKEN: ${{ secrets.PROJECT_SYNC_TOKEN }}
        run: node .github/scripts/update-dashboard.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (
            git add profile/README.md .github/dashboard.config.json _data/velocity.json &&
            git commit -m "chore: update dashboard KPIs [skip ci]" &&
            git push
          )
